<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LernJulia – Buchführung & Bilanzierung</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="login-screen" class="screen active">
  <div class="login-card card">
    <h1>LernJulia</h1>
    <p class="subtitle">Buchführung &amp; Bilanzierung</p>
    <form id="login-form">
      <label for="password-input">Passwort</label>
      <input type="password" id="password-input" placeholder="Passwort eingeben" autocomplete="current-password" required>
      <button type="submit" class="btn btn-primary" id="login-btn">Anmelden</button>
      <p id="login-error" class="error-msg" hidden></p>
    </form>
  </div>
</div>

<div id="app" class="screen">
  <header class="app-header">
    <button id="back-btn" class="btn-icon" hidden aria-label="Zurück">←</button>
    <h2 id="header-title">LernJulia</h2>
    <button id="logout-btn" class="btn-icon" aria-label="Abmelden">⏻</button>
  </header>

  <main id="main-content"></main>
</div>

<script src="js/app.js"></script>
</body>
</html>
